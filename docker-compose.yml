services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: english_practice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d english_practice']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
